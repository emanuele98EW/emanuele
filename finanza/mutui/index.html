<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calcolatore Mutui | Finanza | Emanuele Zanella</title>
  <meta name="description"
    content="Calcola la rata del mutuo, gli interessi totali e analizza l'andamento del debito residuo.">
  <script>
    (function () { var p = localStorage.getItem("themePref"); if (p === "light") { document.documentElement.classList.add("light-mode") } else if (!p) { try { var d = JSON.parse(localStorage.getItem("themeData")); if (d) { var n = Date.now(); if (n >= d.sunrise && n < d.sunset) document.documentElement.classList.add("light-mode") } } catch (e) { } } })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    /* ── Fullscreen button ───────────────────────────────────── */
    #btn-fullscreen {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px 7px 11px;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.18) 0%, rgba(37, 99, 235, 0.08) 100%);
      border: 1px solid rgba(37, 99, 235, 0.55);
      border-radius: 8px;
      color: rgba(147, 197, 253, 0.9);
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 1.5px;
      font-weight: 700;
      transition: all 0.25s cubic-bezier(.4, 0, .2, 1);
      backdrop-filter: blur(6px);
    }

    #btn-fullscreen svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    #btn-fullscreen:hover {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.35) 0%, rgba(37, 99, 235, 0.18) 100%);
      border-color: rgba(37, 99, 235, 0.9);
      color: #bfdbfe;
      box-shadow: 0 0 18px rgba(37, 99, 235, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.07);
      transform: translateY(-1px);
    }

    #btn-fullscreen:active {
      transform: translateY(0);
    }

    /* ── Fullscreen overlay ──────────────────────────────────── */
    #grafico-section.is-fullscreen {
      position: fixed !important;
      inset: 0;
      max-width: 100vw !important;
      width: 100vw !important;
      height: 100vh !important;
      height: 100svh !important;
      margin: 0 !important;
      border-radius: 0 !important;
      border: none !important;
      z-index: 99999 !important;
      display: flex !important;
      flex-direction: column !important;
      padding: 24px 28px 20px;
      box-sizing: border-box;
      background: #050a18 !important;
      overflow: hidden;
    }

    #grafico-section.is-fullscreen h3 {
      margin-bottom: 12px;
      font-size: 1rem;
    }

    #grafico-section.is-fullscreen #grafico-wrapper {
      flex: 1 1 auto !important;
      height: 100% !important;
      min-height: 0;
      padding: 18px 22px;
      display: flex;
      align-items: stretch;
      background: rgba(5, 10, 28, 0.95) !important;
      border-color: rgba(37, 99, 235, 0.3) !important;
      box-shadow: inset 0 0 80px rgba(37, 99, 235, 0.04);
    }

    #grafico-section.is-fullscreen #grafico-wrapper canvas {
      width: 100% !important;
      height: 100% !important;
    }

    #grafico-section.is-fullscreen #btn-fullscreen {
      top: 24px;
      right: 28px;
    }

    #fs-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 5, 0.6);
      backdrop-filter: blur(3px);
      z-index: 9998;
    }

    /* ── Controls ──────────────────────────── */
    .btn-calcola {
      margin-top: 20px;
      padding: 12px 28px;
      background: rgba(37, 99, 235, 0.15);
      border: 1px solid var(--color-finance);
      color: var(--color-finance);
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      transition: all 0.3s;
      letter-spacing: 1px;
    }

    .btn-calcola:hover {
      background: rgba(37, 99, 235, 0.3);
      box-shadow: 0 0 18px rgba(37, 99, 235, 0.45);
    }

    /* Standard Responsive Grid */
    .responsive-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    #grafico-section h3 {
      padding-right: 140px; /* Prevent overlap with FULLSCREEN text button */
    }

    @media(max-width: 700px) {
        #grafico-section h3 { padding-right: 50px; }
        #fs-label { display: none; }
        .card.finance { padding: 20px 16px !important; }
        #grafico-wrapper { min-height: 250px; padding: 8px !important; }
        .responsive-grid { grid-template-columns: 1fr !important; }
    }

    .input-label {
      display: flex;
      flex-direction: column;
      gap: 7px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .input-box {
      padding: 10px;
      background: var(--card-bg);
      border: 1px solid var(--color-finance);
      color: var(--text-primary);
      border-radius: 4px;
      font-family: 'Orbitron', sans-serif;
    }

    .input-box:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
    }
  </style>
</head>

<body>
  <div id="fs-backdrop" onclick="toggleFullscreen()"></div>
  <div class="layout">

    <!-- Dynamic Navbar -->
    <header id="main-navbar"></header>

    <!-- MAIN CONTENT -->
    <main class="main">

      <div style="max-width:800px; width:100%; margin:0 auto 30px;">
        <a href="../index.html#credito"
          style="color:var(--text-secondary); text-decoration:none; font-size:0.85rem; display:inline-flex; align-items:center; gap:6px; margin-bottom:15px; transition:color 0.2s;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          Torna alla Finanza
        </a>
        <h2 style="color:var(--color-finance); text-align:center; text-shadow:0 0 15px rgba(201,168,76,0.3);">
          🏠 Calcolatore Mutui
        </h2>
        <p style="text-align:center; color:var(--text-secondary); font-size:0.9rem; margin-top:8px;">
          Ottieni un riassunto immediato sui costi e sull'andamento del debito residuo del tuo finanziamento.
        </p>
      </div>

      <!-- ── PARAMETRI BASE ────────────────────────────────────── -->
      <section class="card finance" style="max-width:800px;width:100%;margin:0 auto 30px;">
        <h3 style="margin-bottom:18px;">Parametri di Finanziamento</h3>

        <div class="responsive-grid">
          <label class="input-label">
            Importo Mutuo (€)
            <input id="importo" class="input-box format-currency" type="text" inputmode="numeric" value="200.000">
          </label>
          <label class="input-label">
            Durata (Anni)
            <input id="anni" class="input-box format-currency" type="text" inputmode="numeric" value="30">
          </label>
          <label class="input-label">
            Tasso Annuo (TAN %)
            <input id="tasso" class="input-box format-currency" type="text" inputmode="numeric" value="3,5">
          </label>
        </div>

        <button class="btn-calcola" onclick="calcola()">▶ Calcola Rata</button>
      </section>

      <!-- ── RISULTATI PRINCIPALI (CARDS) ──────────────────────── -->
      <div id="risultati-container" style="display:none; max-width:800px; width:100%; margin:0 auto;">
        <h3 style="color:var(--text-primary); margin-bottom:14px; font-size:1.1rem; text-align:center;">Riassunto Costi
        </h3>
        <section class="cards responsive-grid" id="cards-risultati" style="margin-bottom:30px;">
          <!-- Generate dinamicamente da script.js -->
        </section>
      </div>

      <!-- ── GRAFICO ────────────────────────────────────────────── -->
      <section class="card finance" id="grafico-section"
        style="max-width:800px;width:100%;position:relative;margin:0 auto;display:none;">
        <h3 style="margin-bottom:14px;">Andamento Debito Residuo</h3>
        <button id="btn-fullscreen" onclick="toggleFullscreen()" title="Apri a schermo intero">
          <svg id="fs-icon-expand" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9" />
            <polyline points="9 21 3 21 3 15" />
            <line x1="21" y1="3" x2="14" y2="10" />
            <line x1="3" y1="21" x2="10" y2="14" />
          </svg>
          <svg id="fs-icon-compress" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <polyline points="4 14 10 14 10 20" />
            <polyline points="20 10 14 10 14 4" />
            <line x1="10" y1="14" x2="3" y2="21" />
            <line x1="21" y1="3" x2="14" y2="10" />
          </svg>
          <span id="fs-label">FULLSCREEN</span>
        </button>
        <div id="grafico-wrapper"
          style="position:relative; background:var(--card-bg);border-radius:8px;padding:14px;border:1px solid rgba(37,99,235,0.18);">
          <canvas id="grafico" height="130"></canvas>
        </div>
      </section>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
  <script src="../../js/navbar.js"></script>
  <script src="../../js/main.js"></script>
  <script src="../../js/footer.js"></script>
</body>

</html>
