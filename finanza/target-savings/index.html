<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PWT7THK9HL"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-PWT7THK9HL');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Target Savings — Quanto Risparmiare al Mese per l'Obiettivo</title>
  <meta name="description" content="Calcola quanto devi risparmiare ogni mese per raggiungere il tuo obiettivo finanziario. Considera rendimento, inflazione e orizzonte temporale.">
  <script>
    (function () { var p = localStorage.getItem("themePref"); if (p === "light") { document.documentElement.classList.add("light-mode") } else if (!p) { try { var d = JSON.parse(localStorage.getItem("themeData")); if (d) { var n = Date.now(); if (n >= d.sunrise && n < d.sunset) document.documentElement.classList.add("light-mode") } } catch (e) { } } })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <style>


    /* ── General Buttons and Inputs ──────────────────────────── */
    .btn-calcola {
      margin-top: 20px;
      padding: 12px 28px;
      background: rgba(37, 99, 235, 0.15);
      border: 1px solid var(--color-finance);
      color: var(--color-finance);
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      transition: all 0.3s;
      letter-spacing: 1px;
    }

    .btn-calcola:hover {
      background: rgba(37, 99, 235, 0.3);
      box-shadow: 0 0 18px rgba(37, 99, 235, 0.45);
    }

    /* Standard Responsive Grid */
    .responsive-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    @media(max-width: 700px) {
        .card.finance { padding: 20px 16px !important; }
        #grafico-wrapper { min-height: 250px; padding: 8px !important; }
        .responsive-grid { grid-template-columns: 1fr !important; }
    }

    .input-label {
      display: flex;
      flex-direction: column;
      gap: 7px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .input-box {
      padding: 10px;
      background: var(--card-bg);
      border: 1px solid var(--color-finance);
      color: var(--text-primary);
      border-radius: 4px;
      font-family: 'Orbitron', sans-serif;
    }

    .input-box:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
    }
  </style>
</head>

<body>

  <div class="layout">

    <!-- Dynamic Navbar -->
    <header id="main-navbar"></header>

    <!-- MAIN CONTENT -->
    <main class="main">

      <div style="max-width:800px; width:100%; margin:0 auto 30px;">
        <a href="../index.html"
          style="color:var(--text-secondary); text-decoration:none; font-size:0.85rem; display:inline-flex; align-items:center; gap:6px; margin-bottom:15px; transition:color 0.2s;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          Torna alla Finanza
        </a>
        <h2 style="color:var(--color-finance); text-align:center; text-shadow:0 0 15px rgba(201,168,76,0.3);">
          🎯 Target Savings
        </h2>
        <p style="text-align:center; color:var(--text-secondary); font-size:0.9rem; margin-top:8px;">
          Calcola la rata di risparmio mensile esatta per raggiungere il tuo obiettivo finanziario,
          sfruttando il potere dell'interesse composto.
        </p>
      </div>

      <!-- ── PARAMETRI BASE ────────────────────────────────────── -->
      <section class="card finance" style="max-width:800px;width:100%;margin:0 auto 30px;">
        <h3 style="margin-bottom:18px;">Obiettivo Finanziario</h3>

        <div class="responsive-grid">
          <label class="input-label">
            Target finale (€)
            <input id="obiettivo" class="input-box format-currency" type="text" inputmode="numeric" value="100.000">
          </label>
          <label class="input-label">
            Capitale di partenza (€)
            <input id="capitale" class="input-box format-currency" type="text" inputmode="numeric" value="10.000">
          </label>
          <label class="input-label">
            Rendimento annuo atteso (%)
            <input id="rendimento" class="input-box format-currency" type="text" inputmode="numeric" value="5,0">
          </label>
          <label class="input-label">
            Tempo a disposizione (Anni)
            <input id="anni" class="input-box format-currency" type="text" inputmode="numeric" value="10">
          </label>
        </div>

        <button class="btn-calcola" onclick="calcola()">▶ Calcola Rata Mensile</button>
      </section>

      <!-- ── RISULTATI PRINCIPALI (CARDS) ──────────────────────── -->
      <div id="risultati-container" style="display:none; max-width:800px; width:100%; margin:0 auto;">
        <h3 style="color:var(--text-primary); margin-bottom:14px; font-size:1.1rem; text-align:center;">Risultati e
          Scomposizione</h3>
        <section class="cards responsive-grid" id="cards-risultati" style="margin-bottom:30px;">
          <!-- Le card vengono generate dinamicamente da script.js -->
        </section>
      </div>

      <!-- ── GRAFICO A TORTA ──────────────────────────────────────── -->
      <section class="card finance" id="grafico-section"
        style="max-width:800px;width:100%;position:relative;margin:0 auto;display:none;">
        <h3 style="margin-bottom:14px;">Composizione del Target</h3>

        <div id="grafico-wrapper"
          style="position:relative; background:var(--card-bg);border-radius:8px;padding:14px;border:1px solid rgba(37,99,235,0.18);display:flex;justify-content:center;">
          <canvas id="grafico" style="max-height:350px;"></canvas>
        </div>
      </section>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
  <script src="../../js/navbar.js"></script>
  <script src="../../js/main.js"></script>
  <script src="../../js/footer.js"></script>
</body>

</html>
