<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analisi Costi TER | Emanuele Zanella</title>
  <meta name="description" content="Calcola l'impatto delle commissioni TER sul rendimento a lungo termine.">
  <script>
(function(){var p=localStorage.getItem("themePref");if(p==="light"){document.documentElement.classList.add("light-mode")}else if(!p){try{var d=JSON.parse(localStorage.getItem("themeData"));if(d){var n=Date.now();if(n>=d.sunrise&&n<d.sunset)document.documentElement.classList.add("light-mode")}}catch(e){}}})();
</script>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="layout">
    <header id="main-navbar"></header>
        <main class="main">
            <h2 style="color: var(--color-finance); text-align: center; margin-bottom: 30px;">
                💰 Analisi dei Costi (TER)</h2>
            <section class="card finance"
                style="max-width: 800px; width: 100%; margin-bottom: 30px; text-align: center; padding: 40px 20px;">
                <h3 style="margin-bottom: 20px; font-size: 1.5rem; color: #10b981;">Impatto Commissioni</h3>
                <p style="color: #cbd5e1; font-size: 1.1rem; line-height: 1.6; max-width: 600px; margin: 0 auto;">
                    Calcola quanto le commissioni bancarie, i TER degli ETF e i costi di gestione
                    erodono il tuo rendimento complessivo nel lungo periodo.
                </p>
                <div style="margin-top: 30px; font-size: 3rem; opacity: 0.5;">🚧</div>
            </section>
        </main>
    </div>
    <script src="../../js/navbar.js"></script>
  <script src="../../js/main.js"></script>
  <script src="../../js/footer.js"></script>
</body>
</html>
