<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portafoglio | Emanuele Zanella</title>
  <meta name="description" content="Simulatore portafoglio: asset allocation e analisi rendimenti.">
  <script>
// Anti-flash: applica il tema PRIMA del render CSS
(function(){var p=localStorage.getItem("themePref");if(p==="light"){document.documentElement.classList.add("light-mode")}else if(!p){try{var d=JSON.parse(localStorage.getItem("themeData"));if(d){var n=Date.now();if(n>=d.sunrise&&n<d.sunset)document.documentElement.classList.add("light-mode")}}catch(e){}}})();
</script>
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

    <div class="layout">

    <!-- NAVBAR (generated by js/navbar.js) -->
    <header id="main-navbar"></header>

        <!-- MAIN CONTENT -->
        <main class="main">

            <h2
                style="color: #0ea5e9; text-align: center; margin-bottom: 30px; text-shadow: 0 0 10px rgba(14, 165, 233, 0.5);">
                📊
                Portafoglio</h2>

            <!-- CONTENUTO SEGNAPOSTO -->
            <section class="card finance"
                style="max-width: 800px; width: 100%; margin-bottom: 30px; text-align: center; padding: 40px 20px;">
                <h3 style="margin-bottom: 20px; font-size: 1.5rem; color: #38bdf8;">Gestione Asset Allocation</h3>
                <p style="color: #cbd5e1; font-size: 1.1rem; line-height: 1.6; max-width: 600px; margin: 0 auto;">
                    In questa sezione potrai pianificare, bilanciare e analizzare la composizione del tuo portafoglio di
                    investimenti. Il simulatore è attualmente in fase di sviluppo.
                </p>
                <div style="margin-top: 30px; font-size: 3rem; opacity: 0.5;">
                    🚧
                </div>
            </section>

        </main>

    </div>

    <script src="../../js/navbar.js"></script>
  <script src="../../js/main.js"></script>
  <script src="../../js/footer.js"></script>
</body>

</html>
