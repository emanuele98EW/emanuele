<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portafoglio | Emanuele Zanella</title>
  <script>(function(){var p=localStorage.getItem("themePref");if(p==="light"){document.documentElement.classList.add("light-mode")}else if(!p){try{var d=JSON.parse(localStorage.getItem("themeData"));if(d){var n=Date.now();if(n>=d.sunrise&&n<d.sunset)document.documentElement.classList.add("light-mode")}}catch(e){}}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .tool-wrap{max-width:800px;width:100%;margin:0 auto 30px;padding:0 16px;box-sizing:border-box}
    .responsive-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
    .input-label{display:flex;flex-direction:column;gap:7px;font-size:.85rem}
    .input-label input,.input-label select{padding:10px;background:var(--card-bg);border:1px solid var(--color-finance);color:var(--text-primary);border-radius:4px;font-family:'Orbitron',sans-serif;width:100%;box-sizing:border-box}
    .btn-calcola{margin-top:20px;padding:12px 28px;background:rgba(37,99,235,.15);border:1px solid var(--color-finance);color:var(--color-finance);border-radius:4px;cursor:pointer;font-weight:bold;font-family:'Orbitron',sans-serif;font-size:.9rem;transition:all .3s;letter-spacing:1px;width:100%;text-align:center}
    .btn-calcola:hover{background:rgba(37,99,235,.3);box-shadow:0 0 18px rgba(37,99,235,.45)}
    .btn-add{display:flex;align-items:center;gap:8px;padding:9px 18px;margin-top:12px;background:rgba(37,99,235,.08);border:1px dashed rgba(37,99,235,.4);color:var(--color-finance);border-radius:6px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:.75rem;letter-spacing:1px;transition:all .25s;width:fit-content}
    .btn-add:hover{background:rgba(37,99,235,.18);border-style:solid}
    .btn-remove{background:transparent;border:1px solid rgba(239,68,68,.45);color:#f87171;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:.7rem;font-family:'Orbitron',sans-serif;transition:all .2s}
    .btn-remove:hover{background:rgba(239,68,68,.15)}
    .asset-row{display:grid;grid-template-columns:1fr 100px 50px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-color,rgba(255,255,255,.06))}
    @media(max-width:600px){.responsive-grid{grid-template-columns:1fr}.asset-row{grid-template-columns:1fr 80px 40px}}
    #pie-wrap{display:flex;justify-content:center;margin:20px 0}
    #pie-wrap canvas{max-width:320px;max-height:320px}
  </style>
</head>
<body>
  <div class="layout">
    <header id="main-navbar"></header>
    <main class="main">
      <p style="text-align:center;margin-bottom:10px"><a href="../index.html" style="color:var(--color-finance);text-decoration:none;font-size:.85rem;font-family:'Orbitron',sans-serif;letter-spacing:1px">← Torna a Finanza</a></p>
      <h2 style="color:var(--color-finance);text-align:center;margin-bottom:30px;font-size:clamp(1.5rem,5vw,2rem)">📊 Portafoglio</h2>
      <p style="text-align:center;max-width:700px;margin:0 auto 30px;color:var(--text-secondary);font-size:.9rem;padding:0 15px">Inserisci i tuoi asset con il relativo valore per visualizzare la distribuzione del tuo portafoglio e la percentuale di ogni componente.</p>
      <section class="card finance tool-wrap" style="padding:clamp(20px,5vw,30px)">
        <h3 style="margin-bottom:18px">I tuoi Asset</h3>
        <div id="asset-list"></div>
        <button class="btn-add" onclick="addAsset()">＋ Aggiungi Asset</button>
        <button class="btn-calcola" onclick="calcola()">▶ Calcola Distribuzione</button>
      </section>
      <section class="card finance tool-wrap" style="padding:clamp(20px,5vw,30px)">
        <h3 style="margin-bottom:14px">Distribuzione</h3>
        <div id="pie-wrap"><canvas id="pieChart"></canvas></div>
        <div id="summary" style="margin-top:15px"></div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    let assetId=0,chart=null;
    function addAsset(n,v){assetId++;const d=document.createElement('div');d.className='asset-row';d.id='a'+assetId;d.innerHTML=`<input type="text" placeholder="Nome asset" value="${n||''}" style="padding:8px;background:var(--card-bg);border:1px solid var(--color-finance);color:var(--text-primary);border-radius:4px;font-size:.85rem"><input type="text" inputmode="numeric" placeholder="€" value="${v||''}" class="format-currency" style="padding:8px;background:var(--card-bg);border:1px solid var(--color-finance);color:var(--text-primary);border-radius:4px;font-size:.85rem;text-align:right"><button class="btn-remove" onclick="this.parentElement.remove()">✕</button>`;document.getElementById('asset-list').appendChild(d)}
    addAsset('ETF Azionario','5.000');addAsset('ETF Obbligazionario','3.000');addAsset('Oro','2.000');
    function parseCur(v){return parseFloat((v||'0').replace(/\./g,'').replace(',','.'))||0}
    function fmtEur(n){return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n)}
    const COLORS=['#10b981','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#06b6d4','#84cc16'];
    function calcola(){
      const rows=document.querySelectorAll('.asset-row');let items=[];
      rows.forEach(r=>{const inp=r.querySelectorAll('input');const name=inp[0].value||'Senza nome';const val=parseCur(inp[1].value);if(val>0)items.push({name,val})});
      if(!items.length)return;
      const tot=items.reduce((s,i)=>s+i.val,0);
      const isL=document.documentElement.classList.contains('light-mode');
      if(chart)chart.destroy();
      chart=new Chart(document.getElementById('pieChart'),{type:'doughnut',data:{labels:items.map(i=>i.name),datasets:[{data:items.map(i=>i.val),backgroundColor:COLORS.slice(0,items.length),borderWidth:0}]},options:{responsive:true,plugins:{legend:{labels:{color:isL?'#1e293b':'#94a3b8',font:{family:'Orbitron',size:10}}}}}});
      let html='<div style="display:flex;flex-direction:column;gap:8px">';
      items.forEach((it,i)=>{const pct=(it.val/tot*100).toFixed(1);html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border-color,rgba(255,255,255,.06))"><span style="display:flex;align-items:center;gap:8px"><span style="width:12px;height:12px;border-radius:3px;background:${COLORS[i%COLORS.length]}"></span><span style="color:var(--text-primary);font-size:.85rem">${it.name}</span></span><span style="font-family:'Orbitron',sans-serif;font-size:.8rem;color:var(--text-secondary)">${fmtEur(it.val)} · ${pct}%</span></div>`});
      html+=`<div style="display:flex;justify-content:space-between;padding:10px 0;font-weight:bold"><span style="color:var(--text-primary)">Totale</span><span style="font-family:'Orbitron',sans-serif;color:var(--color-finance)">${fmtEur(tot)}</span></div></div>`;
      document.getElementById('summary').innerHTML=html;
    }
    document.addEventListener('DOMContentLoaded',()=>setTimeout(calcola,100));
  </script>
  <script src="../../js/navbar.js"></script><script src="../../js/main.js"></script><script src="../../js/footer.js"></script>
</body>
</html>
