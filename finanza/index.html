<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Finanza | Emanuele Zanella</title>
  <meta name="description" content="Sezione Finanza - Analisi, investimenti e simulazioni finanziarie.">
  <script>(function(){var p=localStorage.getItem('themePref');if(p==='light'){document.documentElement.classList.add('light-mode')}else if(!p){try{var d=JSON.parse(localStorage.getItem('themeData'));if(d){var n=Date.now();if(n>=d.sunrise&&n<d.sunset)document.documentElement.classList.add('light-mode')}}catch(e){}}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    --hero-rgb: 16,185,129;
        /* ══ SHARED PAGE STYLES (same language as home) ══════ */
    .main { padding-top: 0 !important; }

    /* Hero strip */
    .page-hero {
      display: flex; align-items: center; gap: 24px;
      max-width: 900px; margin: 28px auto 30px;
      padding: 22px 28px;
      background: var(--card-bg, rgba(255,255,255,0.03));
      border: 1px solid var(--border-color, rgba(255,255,255,0.08));
      border-radius: 16px; position: relative; overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }
    .page-hero::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background: radial-gradient(ellipse at 0% 50%,
        rgba(var(--hero-rgb,200,160,60),0.07) 0%, transparent 60%);
    }
    .hero-icon {
      flex-shrink:0; width:56px; height:56px; border-radius:14px;
      border:1px solid rgba(var(--hero-rgb,200,160,60),0.35);
      display:flex; align-items:center; justify-content:center;
      background:rgba(var(--hero-rgb,200,160,60),0.08);
      box-shadow:0 0 20px rgba(var(--hero-rgb,200,160,60),0.12);
    }
    .hero-icon svg { filter:drop-shadow(0 0 8px rgba(var(--hero-rgb,200,160,60),0.5)); }
    .hero-info { flex:1; }
    .hero-title {
      font-family:'Orbitron',sans-serif; font-weight:700;
      color:var(--hero-color,var(--color-engineering));
      font-size:1.35rem; letter-spacing:1.5px; margin:0 0 4px; line-height:1.1;
    }
    .hero-sub {
      font-size:0.76rem; color:var(--text-secondary);
      letter-spacing:1.5px; text-transform:uppercase; margin:0 0 2px;
    }
    .hero-breadcrumb {
      font-size:0.78rem; color:var(--text-secondary); margin:8px 0 0;
    }
    .hero-breadcrumb a { color:var(--hero-color,var(--color-engineering)); text-decoration:none; }
    .hero-breadcrumb a:hover { text-decoration:underline; }
    .hero-breadcrumb span { margin:0 5px; opacity:.5; }

    /* Grid */
    .page-grid {
      display:grid; grid-template-columns:1fr 260px;
      gap:18px; max-width:960px; margin:0 auto; padding:0 0 48px;
      align-items:start;
    }
    .page-grid.wide { grid-template-columns:1fr; max-width:900px; }
    .page-main { display:flex; flex-direction:column; gap:14px; }
    .page-side  { display:flex; flex-direction:column; gap:14px; }

    /* Nav cards (same as home) */
    .nav-card {
      display:flex; align-items:center; gap:16px; padding:17px 20px;
      border-radius:14px; text-decoration:none;
      background:var(--card-bg,rgba(255,255,255,0.03));
      border:1px solid var(--border-color,rgba(255,255,255,0.08));
      transition:background .2s, border-color .2s, transform .2s;
      position:relative; overflow:hidden;
    }
    .nav-card::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity .2s; pointer-events:none; }
    .nav-card:hover { transform:translateX(4px); }
    .nav-card:hover::before { opacity:1; }
    .nav-card.finance:hover    { border-color:rgba(16,185,129,.4);  background:rgba(16,185,129,.05); }
    .nav-card.finance::before  { background:radial-gradient(ellipse at left,rgba(16,185,129,.08),transparent 70%); }
    .nav-card.finance .nc-icon { background:rgba(16,185,129,.1); border-color:rgba(16,185,129,.3); }
    .nav-card.finance .nc-icon svg, .nav-card.finance .nc-arrow { color:#10b981; }
    .nav-card.engineering:hover    { border-color:rgba(var(--color-engineering-rgb,200,160,60),.4); background:rgba(var(--color-engineering-rgb,200,160,60),.05); }
    .nav-card.engineering::before  { background:radial-gradient(ellipse at left,rgba(var(--color-engineering-rgb,200,160,60),.08),transparent 70%); }
    .nav-card.engineering .nc-icon { background:rgba(var(--color-engineering-rgb,200,160,60),.1); border-color:rgba(var(--color-engineering-rgb,200,160,60),.3); }
    .nav-card.engineering .nc-icon svg, .nav-card.engineering .nc-arrow { color:var(--color-engineering); }
    .nav-card.personal:hover    { border-color:rgba(139,92,246,.4); background:rgba(139,92,246,.05); }
    .nav-card.personal::before  { background:radial-gradient(ellipse at left,rgba(139,92,246,.08),transparent 70%); }
    .nav-card.personal .nc-icon { background:rgba(139,92,246,.1); border-color:rgba(139,92,246,.3); }
    .nav-card.personal .nc-icon svg, .nav-card.personal .nc-arrow { color:#a78bfa; }
    .nav-card.muted:hover    { border-color:rgba(var(--color-engineering-rgb,200,160,60),.2); }
    .nav-card.muted .nc-icon { background:rgba(255,255,255,.04); border-color:rgba(255,255,255,.12); }
    .nav-card.muted .nc-icon svg, .nav-card.muted .nc-arrow { color:var(--text-secondary); }
    .nc-icon {
      width:44px; height:44px; border-radius:11px; border:1px solid;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .nc-icon svg { filter:drop-shadow(0 0 5px currentColor); }
    .nc-text { flex:1; }
    .nc-title { font-size:.93rem; font-weight:700; color:var(--text-primary); margin:0 0 2px; line-height:1.2; }
    .nc-desc  { font-size:.75rem; color:var(--text-secondary); margin:0; }
    .nc-badge {
      font-size:.6rem; font-weight:700; letter-spacing:.8px; text-transform:uppercase;
      padding:2px 8px; border-radius:20px;
      background:rgba(var(--color-engineering-rgb,200,160,60),.1);
      border:1px solid rgba(var(--color-engineering-rgb,200,160,60),.25);
      color:var(--color-engineering); flex-shrink:0;
    }
    .nc-arrow { opacity:.4; flex-shrink:0; transition:opacity .2s, transform .2s; }
    .nav-card:hover .nc-arrow { opacity:1; transform:translateX(2px); }

    /* Widget card */
    .widget-card {
      background:var(--card-bg,rgba(255,255,255,0.03));
      border:1px solid var(--border-color,rgba(255,255,255,0.08));
      border-radius:14px; padding:15px 17px;
    }
    .wc-title {
      font-family:'Orbitron',sans-serif; font-size:0.63rem; letter-spacing:2px;
      text-transform:uppercase; color:var(--color-engineering);
      margin:0 0 12px; display:flex; align-items:center; gap:8px;
    }
    .wc-title::after { content:''; flex:1; height:1px; background:rgba(var(--color-engineering-rgb,200,160,60),0.2); }

    /* Section separator */
    .section-sep {
      font-size:.65rem; font-weight:700; letter-spacing:2px; text-transform:uppercase;
      color:var(--text-secondary); padding:10px 0 6px;
      border-bottom:1px solid var(--border-color,rgba(255,255,255,.07));
      margin-bottom:4px; opacity:.7;
    }

    .hero-logo-container{width:64px;height:64px;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .hero-logo{width:100%;height:100%;object-fit:contain;animation:logospin 12s linear infinite;filter:drop-shadow(0 0 10px rgba(16,185,129,0.5));}
    @keyframes logospin{from{transform:rotateY(0deg)}to{transform:rotateY(360deg)}}
    .hero-logo-container::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(16,185,129,0.25);animation:pulse 3s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.7;transform:scale(1.04)}}
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

    @media(max-width:700px){
      .page-grid { grid-template-columns:1fr; }
      .page-hero { flex-direction:column; text-align:center; padding:18px 16px; margin:14px 0 22px; }
      .hero-breadcrumb { text-align:center; }
    }

    /* Finance accent overrides */
    .page-hero { --hero-rgb:16,185,129; --hero-color:#10b981; }
    .wc-title { color:#10b981; }
    .wc-title::after { background:rgba(16,185,129,0.2); }
    /* Crypto table */
    .crypto-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid var(--border-color,rgba(255,255,255,0.06)); font-size:.8rem; }
    .crypto-row:last-child { border-bottom:none; }
    .crypto-name { font-weight:600; color:var(--text-primary); }
    .crypto-price { color:#10b981; font-weight:700; }
    .crypto-change.pos { color:#4ade80; font-size:.72rem; }
    .crypto-change.neg { color:#f87171; font-size:.72rem; }
    /* Fear Greed gauge */
    .fg-value { font-family:'Orbitron',sans-serif; font-size:2.2rem; font-weight:700; text-align:center; margin:8px 0 4px; }
    .fg-label { font-size:.72rem; text-align:center; color:var(--text-secondary); text-transform:uppercase; letter-spacing:1.5px; }
    .fg-bar { height:8px; border-radius:4px; background:linear-gradient(90deg,#ef4444 0%,#f97316 25%,#facc15 50%,#86efac 75%,#22c55e 100%); position:relative; margin:10px 0 4px; }
    .fg-needle { position:absolute; top:-3px; width:14px; height:14px; background:var(--text-primary); border-radius:50%; transform:translateX(-50%); transition:left .6s ease; border:2px solid var(--card-bg,#0d1117); }
    /* Markets */
    .mkt-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border-color,rgba(255,255,255,0.06)); font-size:.78rem; }
    .mkt-row:last-child { border-bottom:none; }
    .mkt-name { color:var(--text-secondary); }
    .mkt-val { font-weight:600; color:var(--text-primary); }
    .mkt-chg { font-size:.7rem; }

    /* ── Logo rotante ─────────────────────────────────── */
    .logo-spin-wrap {
      display:flex; justify-content:center; align-items:center;
      flex-shrink:0;
    }
    .hero-logo-container {
      width:100px; height:100px; position:relative;
      display:flex; align-items:center; justify-content:center;
    }
    .hero-logo {
      width:100%; height:100%; object-fit:contain;
      animation:logospin 12s linear infinite;
    }
    .hero-logo-container::after {
      content:''; position:absolute; inset:-8px; border-radius:50%;
      border:1px solid rgba(var(--hero-ring-rgb,16,185,129),0.25);
      animation:pulse 3s ease-in-out infinite;
    }
    @keyframes logospin { from{transform:rotateY(0deg)} to{transform:rotateY(360deg)} }
    @keyframes pulse { 0%,100%{opacity:.3;transform:scale(1)} 50%{opacity:.7;transform:scale(1.04)} }
  </style>
</head>
<body>
<div class="layout">
  <header id="main-navbar"></header>
  <main class="main" style="padding:0 16px;">

    <!-- HERO -->
    <div class="page-hero" style="--hero-rgb:16,185,129;">
      <div class="hero-logo-container" id="hero-container"><img src="../assets/logo.png" alt="Logo" class="hero-logo" id="hero-logo"></div>
      <div class="hero-info">
        <p class="hero-sub">Sezione</p>
        <h1 class="hero-title" style="color:#10b981;">Finanza</h1>
        <p class="hero-breadcrumb">
          <a href="../index.html">Home</a><span>/</span>
          <span style="color:var(--text-primary);">Finanza</span>
        </p>
      </div>
    </div>

    <!-- GRID -->
    <div class="page-grid">

      <!-- MAIN: tool di navigazione -->
      <div class="page-main" style="animation:fadeUp .45s ease .05s both;">
        <div class="section-sep">Calcolatori</div>
        <a class="nav-card finance" href="interesse/index.html"><div class="nc-icon"><svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></div><div class="nc-text"><p class="nc-title">Interesse Composto</p><p class="nc-desc">Crescita del capitale nel tempo</p></div><svg class="nc-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></a>
        <div class="nav-card finance muted"><div class="nc-icon"><svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg></div><div class="nc-text"><p class="nc-title">Portafoglio</p><p class="nc-desc">Asset allocation e diversificazione</p></div><span class="nc-badge">Presto</span></div>
        <div class="nav-card finance muted"><div class="nc-icon"><svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg></div><div class="nc-text"><p class="nc-title">Mutui</p><p class="nc-desc">Rate, interessi e piani di ammortamento</p></div><span class="nc-badge">Presto</span></div>
      </div>

      <!-- SIDE: widget mercati -->
      <div class="page-side" style="animation:fadeUp .45s ease .15s both;">

        <!-- Fear & Greed -->
        <div class="widget-card">
          <p class="wc-title" style="color:#10b981;">Fear &amp; Greed ⚖️</p>
          <div id="fg-content">
            <div style="text-align:center;color:var(--text-secondary);font-size:.76rem;padding:12px 0;">Caricamento…</div>
          </div>
        </div>

        <!-- Crypto Live -->
        <div class="widget-card">
          <p class="wc-title" style="color:#10b981;">Crypto Live 📈</p>
          <div id="crypto-content">
            <div style="text-align:center;color:var(--text-secondary);font-size:.76rem;padding:12px 0;">Caricamento…</div>
          </div>
        </div>

        <!-- Materie prime & Indici -->
        <div class="widget-card">
          <p class="wc-title" style="color:#10b981;">Mercati 🌍</p>
          <div id="market-content">
            <div style="text-align:center;color:var(--text-secondary);font-size:.76rem;padding:12px 0;">Caricamento…</div>
          </div>
        </div>

      </div>
    </div>

  </main>
</div>
<script src="../js/navbar.js"></script>
<script src="../js/main.js"></script>
<script src="../js/footer.js"></script>
<script>
/* ── Fear & Greed ─────────────────────────────────── */
async function fetchFearGreed() {
  try {
    const r = await fetch('https://api.alternative.me/fng/?limit=1');
    const d = await r.json();
    const val = parseInt(d.data[0].value);
    const lbl = d.data[0].value_classification;
    const colors = { 'Extreme Fear':'#ef4444','Fear':'#f97316','Neutral':'#facc15','Greed':'#86efac','Extreme Greed':'#22c55e' };
    const col = colors[lbl] || '#facc15';
    document.getElementById('fg-content').innerHTML = `
      <div class="fg-bar"><div class="fg-needle" id="fg-needle" style="left:${val}%"></div></div>
      <div class="fg-value" style="color:${col}">${val}</div>
      <div class="fg-label">${lbl}</div>`;
  } catch(e) {
    document.getElementById('fg-content').innerHTML = "<span style='color:#ef4444;font-size:.74rem;'>Errore API</span>";
  }
}

/* ── Crypto ───────────────────────────────────────── */
async function fetchCrypto() {
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=eur&include_24hr_change=true');
    const d = await r.json();
    const coins = [['bitcoin','BTC'],['ethereum','ETH'],['solana','SOL']];
    let html = '';
    coins.forEach(([id,sym]) => {
      if (!d[id]) return;
      const p = d[id].eur, ch = d[id].eur_24h_change?.toFixed(2);
      const chCls = ch >= 0 ? 'pos' : 'neg';
      const sign = ch >= 0 ? '+' : '';
      html += `<div class="crypto-row"><span class="crypto-name">${sym}</span><span class="crypto-price">€${p?.toLocaleString('it-IT',{maximumFractionDigits:0})}</span><span class="crypto-change ${chCls}">${sign}${ch}%</span></div>`;
    });
    document.getElementById('crypto-content').innerHTML = html || '<span style="color:var(--text-secondary);font-size:.76rem;">Dati non disponibili</span>';
  } catch(e) {
    document.getElementById('crypto-content').innerHTML = "<span style='color:#ef4444;font-size:.74rem;'>Errore API</span>";
  }
}

/* ── Markets (gold, oil, S&P) ──────────────────────── */
async function fetchMarkets() {
  // Open-Meteo non ha mercati finanziari — usiamo API gratuite disponibili
  // Tentativo con Yahoo Finance via allorigins proxy
  const assets = [
    {sym:'GC=F', name:'Oro (/oz)'},
    {sym:'CL=F', name:'Petrolio WTI'},
    {sym:'^GSPC', name:'S&P 500'},
  ];
  let html = '';
  try {
    for (const a of assets) {
      try {
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${a.sym}?interval=1d&range=2d`;
        const r = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
        const d = await r.json();
        const meta = d.chart?.result?.[0]?.meta;
        if (!meta) throw new Error();
        const price = meta.regularMarketPrice;
        const prev  = meta.previousClose;
        const chg   = ((price-prev)/prev*100).toFixed(2);
        const chCls = chg >= 0 ? 'pos' : 'neg';
        const sign  = chg >= 0 ? '+' : '';
        html += `<div class="mkt-row"><span class="mkt-name">${a.name}</span><span style="display:flex;gap:6px;align-items:center;"><span class="mkt-val">${price?.toLocaleString('it-IT',{maximumFractionDigits:1})}</span><span class="mkt-chg ${chCls}">${sign}${chg}%</span></span></div>`;
      } catch { html += `<div class="mkt-row"><span class="mkt-name">${a.name}</span><span style="color:var(--text-secondary);font-size:.72rem;">N/D</span></div>`; }
    }
    document.getElementById('market-content').innerHTML = html;
  } catch(e) {
    document.getElementById('market-content').innerHTML = "<span style='color:#ef4444;font-size:.74rem;'>Errore API</span>";
  }
}

fetchFearGreed();
fetchCrypto();
fetchMarkets();
</script>
</body></html>
