  <style>
    .wip-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 60px 20px;
      animation: fadeUp 0.5s ease both;
    }
    .wip-gif {
      max-width: 380px;
      border-radius: 16px;
      margin-bottom: 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      border: 1px solid var(--border-color, rgba(255,255,255,0.08));
    }
    html.light-mode .wip-gif {
      box-shadow: 0 12px 40px rgba(27,46,107,0.15);
      border-color: rgba(27,46,107,0.2);
    }
    .wip-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      color: var(--color-engineering);
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    html.light-mode .wip-title { color: #1B2E6B; }
    
    .wip-desc {
      font-size: 1.05rem;
      color: var(--text-secondary);
      max-width: 480px;
      margin-bottom: 35px;
      line-height: 1.6;
    }
    
    /* Animation keyframes reused from Home */
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  </style>
</head>
