    <link rel="stylesheet" href="../../../../../css/style.css">
    <style>
        .table-controls {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border);
            border-radius: 12px;

        }

        .search-input {

            border-radius: 8px;

            font-size: 1rem;
            flex-grow: 1;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--color-engineering);
            box-shadow: 0 0 10px var(--color-engineering-glow);
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            box-shadow: var(--shadow-base);
            max-height: 700px;
            overflow-y: auto;
        }

        table {
            width: 100%;

        }

        thead {

        }

        th {
            padding: 15px 10px;
            color: var(--color-engineering);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--card-border);
            cursor: pointer;
            white-space: nowrap;
        }

        th:hover {
            background: rgba(96, 165, 250, 0.1);
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--card-border);
            color: var(--text-primary);
            white-space: nowrap;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
            color: var(--color-engineering);
        }

        .unit-note {
            display: block;
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 4px;

        }

        /* Responsive Mobile */

    <script src="data.js"></script>
    <script>
        let steamData = tableData.data;
        let headers = tableData.headers;

        function loadData() {
            renderHeaders();
            // Per il vapore surriscaldato i dati sono tantissimi (~9500 righe). 
            // Inizialmente mostriamo solo le prime 500 righe per non appesantire la UI, o tutto se filtrato
            renderTable(steamData.slice(0, 500));
            document.getElementById('row-count').textContent = `Mostrando 500 di ${steamData.length} record totali. Usa i filtri per cercare.`;
        }

        function renderHeaders() {
            const headerRow = document.getElementById('table-headers');
            headerRow.innerHTML = headers.map((h, i) => {
                let cleanH = h.split(' (')[0];
                let unit = h.includes(' (') ? '(' + h.split(' (')[1] : '';
                if (!unit && h.includes(' [')) {
                    cleanH = h.split(' [')[0];
                    unit = '[' + h.split(' [')[1];
                }

                // Colonna Pressione
                if (cleanH === "Pressure") {
                    cleanH = "P";
                    unit = "(bar g)";
                }
                if (cleanH === "Temperature") {
                    cleanH = "T";
                    unit = "(°C)";
                }

                if (cleanH.includes("Specific Volume")) cleanH = cleanH.replace("Specific Volume", "Vol. Sp.");
                if (cleanH.includes("Specific Internal Energy")) cleanH = cleanH.replace("Specific Internal Energy", "En. Int.");
                if (cleanH.includes("Specific Enthalpy")) cleanH = cleanH.replace("Specific Enthalpy", "Entalpia");
                if (cleanH.includes("Specific Entropy")) cleanH = cleanH.replace("Specific Entropy", "Entropia");
                if (cleanH.includes("Phase")) cleanH = cleanH.replace("Phase", "Stato");
                if (cleanH.includes("Density")) cleanH = cleanH.replace("Density", "Densità");

                return `<th onclick="sortTable(${i})">
                            ${cleanH}
                            <span class="unit-note">${unit}</span>
                        </th>`;
            }).join('');
        }

        function renderTable(data) {
            const body = document.getElementById('table-body');
            body.innerHTML = data.map(row => {
                return `<tr>${row.map((val, colIndex) => {
                    if (val === null) return '<td>---</td>';
                    let displayVal = val;
                    // Conversione colonna Pressione P(MPa) -> (bar g), indice 0
                    if (colIndex === 0) {
                        displayVal = (val * 10) - 1.01325;
                        if (displayVal < -1.01) displayVal = -1.013;
                    }
                    if (typeof displayVal === 'number') {
                        return `<td>${displayVal.toLocaleString('it-IT', { minimumFractionDigits: 1, maximumFractionDigits: 4 })}</td>`;
                    }
                    return `<td>${displayVal}</td>`;
                }).join('')}</tr>`;
            }).join('');
        }

        function filterData() {
            const searchP = document.getElementById('steam-search-p').value.trim().replace(',', '.');
            const searchT = document.getElementById('steam-search-t').value.trim().replace(',', '.');

            if (searchP === "" && searchT === "") {
                renderTable(steamData.slice(0, 500));
                document.getElementById('row-count').textContent = `Mostrando 500 di ${steamData.length} record totali. Usa i filtri per cercare.`;
                return;
            }

            const targetP = parseFloat(searchP);
            const targetT = parseFloat(searchT);

            const filtered = steamData.filter(row => {
                const p_barg = (row[0] * 10) - 1.01325;
                const t = row[1];

                let match = true;

                if (!isNaN(targetP)) {
                    if (!(p_barg >= (targetP - 1) && p_barg <= (targetP + 1))) {
                        match = false;
                    }
                }

                if (!isNaN(targetT) && match) {
                    if (!(t >= (targetT - 1) && t <= (targetT + 1))) {
                        match = false;
                    }
                }

                return match;
            });

            // Limit results slightly if they are still huge (e.g. only P filtered logic out of 9500)
            const cap = 1500;
            if (filtered.length > cap) {
                renderTable(filtered.slice(0, cap));
                document.getElementById('row-count').textContent = `Risultati: ${filtered.length} (Mostrando i primi ${cap} per performance)`;
            } else {
                renderTable(filtered);
                document.getElementById('row-count').textContent = `Risultati: ${filtered.length}`;
            }
        }

        document.getElementById('steam-search-p').addEventListener('input', filterData);
        document.getElementById('steam-search-t').addEventListener('input', filterData);

        let sortDirection = 1;
        function sortTable(columnIndex) {
            sortDirection *= -1;
            // Ordiniamo solo il set corrente visualizzato o forziamo l'ordinamento globale?
            // Per 9500 righe l'ordinamento in JS è ok, ma la renderTable su 9500 no.
            steamData.sort((a, b) => {
                let valA = a[columnIndex] || 0;
                let valB = b[columnIndex] || 0;
                if (columnIndex === 0) valA = (valA * 10) - 1.01325;
                if (columnIndex === 0) valB = (valB * 10) - 1.01325;

                if (typeof valA === 'string') return valA.localeCompare(valB) * sortDirection;
                return (valA - valB) * sortDirection;
            });
            filterData(); // re-applica il filtro e i l limits
        }

        window.onload = loadData;
    </script>
</body>
