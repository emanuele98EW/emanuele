    <style>
        .calculator-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .input-section {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow-base);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .steam-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 12px 15px;
            color: var(--text-primary);
            font-size: 1.2rem;
            width: 150px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        .steam-input:focus {
            border-color: var(--color-engineering);
            box-shadow: 0 0 15px var(--color-engineering-glow);
        }

        .unit-select {
            background: var(--nav-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .result-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .result-card:hover {
            transform: translateY(-5px);
            border-color: var(--color-engineering);
        }

        .result-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-value {
            display: block;
            color: var(--color-engineering);
            font-size: 1.5rem;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px var(--color-engineering-glow);
        }

        .result-unit {
            display: block;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .btn-calc {
            background: var(--color-engineering);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px var(--color-engineering-glow);
        }

        .btn-calc:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--color-engineering-glow);
        }
    </style>
</head>
