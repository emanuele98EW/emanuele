<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Proprietà Fluido | Emanuele Zanella</title>
  <meta name="description" content="Calcolatore proprietà termodinamiche dei fluidi con CoolProp via Pyodide.">
  <script>
    (function(){var p=localStorage.getItem("themePref");if(p==="light"){document.documentElement.classList.add("light-mode")}else if(!p){try{var d=JSON.parse(localStorage.getItem("themeData"));if(d){var n=Date.now();if(n>=d.sunrise&&n<d.sunset)document.documentElement.classList.add("light-mode")}}catch(e){}}})();
  </script>
  <link rel="stylesheet" href="../../../../css/style.css">
  <style>
    .tool-wrapper { max-width: 880px; width: 100%; display: flex; flex-direction: column; gap: 24px; }

    /* ── Loading overlay ── */
    #loading-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.82);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }
    .load-title {
      font-family: 'Orbitron', sans-serif; font-size: 1rem;
      color: var(--color-engineering); letter-spacing: 2px;
    }
    .load-sub {
      font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
      color: #666; letter-spacing: 1px; text-align: center; max-width: 320px;
    }
    .load-bar-wrap {
      width: 280px; height: 4px; background: rgba(16,185,129,0.15); border-radius: 4px; overflow: hidden;
    }
    .load-bar {
      height: 100%; background: var(--color-engineering);
      border-radius: 4px; width: 0%;
      transition: width 0.4s ease;
    }
    #load-status {
      font-family: 'Orbitron', sans-serif; font-size: 0.65rem; color: #555; letter-spacing: 1px;
    }

    /* ── Input card ── */
    .input-card {
      background: var(--card-bg);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 12px; padding: 28px 30px;
    }
    .input-card h3 {
      font-family: 'Orbitron', sans-serif; font-size: 0.78rem;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--color-engineering); margin-bottom: 22px;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    @media(max-width:560px){ .form-grid { grid-template-columns: 1fr; } }

    .form-field { display: flex; flex-direction: column; gap: 7px; }
    .form-field label {
      font-family: 'Orbitron', sans-serif; font-size: 0.62rem;
      letter-spacing: 1.5px; text-transform: uppercase; color: #888;
    }
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾'; position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%); color: var(--color-engineering);
      pointer-events: none; font-size: 0.9rem;
    }
    .form-field select {
      width: 100%; padding: 11px 36px 11px 13px;
      background: var(--card-bg);
      border: 1px solid rgba(16,185,129,0.4);
      color: var(--text-primary); border-radius: 6px;
      font-family: 'Orbitron', sans-serif; font-size: 0.8rem;
      appearance: none; -webkit-appearance: none;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .form-field select:focus {
      border-color: var(--color-engineering);
      box-shadow: 0 0 0 3px rgba(16,185,129,.12);
    }

    /* pair inputs */
    .pair-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 18px; }
    @media(max-width:560px){ .pair-row { grid-template-columns: 1fr; } }
    .pair-field { display: flex; flex-direction: column; gap: 7px; }
    .pair-field label {
      font-family: 'Orbitron', sans-serif; font-size: 0.62rem;
      letter-spacing: 1.5px; text-transform: uppercase; color: #888;
    }
    .input-with-unit {
      display: flex; align-items: stretch;
      border: 1px solid rgba(16,185,129,.4); border-radius: 6px; overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-with-unit:focus-within {
      border-color: var(--color-engineering);
      box-shadow: 0 0 0 3px rgba(16,185,129,.12);
    }
    .input-with-unit input {
      flex: 1; padding: 11px 12px;
      background: var(--card-bg); border: none;
      color: var(--text-primary);
      font-family: 'Orbitron', sans-serif; font-size: 0.82rem;
      outline: none; width: 0;
    }
    .unit-badge {
      padding: 11px 12px;
      background: rgba(16,185,129,.08);
      border-left: 1px solid rgba(16,185,129,.25);
      font-family: 'Orbitron', sans-serif; font-size: 0.68rem;
      color: var(--color-engineering);
      display: flex; align-items: center; white-space: nowrap;
      min-width: 54px; justify-content: center;
    }

    /* sep / lbl */
    .sep { border: none; border-top: 1px solid rgba(16,185,129,.15); margin: 22px 0 16px; }

    /* btn calcola */
    .btn-calcola {
      margin-top: 20px; padding: 12px 30px;
      background: rgba(16,185,129,.12); border: 1px solid var(--color-engineering);
      color: var(--color-engineering); border-radius: 6px; cursor: pointer;
      font-family: 'Orbitron', sans-serif; font-size: 0.82rem;
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      transition: all .25s; display: flex; align-items: center; gap: 10px;
    }
    .btn-calcola:hover { background: rgba(16,185,129,.25); box-shadow: 0 0 18px rgba(16,185,129,.3); }
    .btn-calcola:disabled { opacity: .35; cursor: not-allowed; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(16,185,129,.3);
      border-top-color: var(--color-engineering);
      border-radius: 50%; animation: spin .7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* error */
    .error-box {
      display: none; margin-top: 16px;
      background: rgba(239,68,68,.07);
      border: 1px solid rgba(239,68,68,.35);
      border-radius: 8px; padding: 12px 16px;
      color: #fca5a5; font-family: 'Orbitron', sans-serif; font-size: .75rem;
    }

    /* ── Results ── */
    .results-card {
      display: none;
      background: var(--card-bg);
      border: 1px solid rgba(16,185,129,.22);
      border-radius: 12px; padding: 28px 30px;
    }
    .results-card h3 {
      font-family: 'Orbitron', sans-serif; font-size: 0.78rem;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--color-engineering); margin-bottom: 18px;
    }
    .phase-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 14px; border-radius: 20px; margin-bottom: 20px;
      font-family: 'Orbitron', sans-serif; font-size: .65rem;
      letter-spacing: 1px; text-transform: uppercase; border: 1px solid;
    }
    .phase-liquid   { color: #38bdf8; border-color: rgba(56,189,248,.4);  background: rgba(56,189,248,.07);  }
    .phase-gas      { color: #a78bfa; border-color: rgba(167,139,250,.4); background: rgba(167,139,250,.07); }
    .phase-twophase { color: #fb923c; border-color: rgba(251,146,60,.4);  background: rgba(251,146,60,.07);  }
    .phase-super    { color: #f472b6; border-color: rgba(244,114,182,.4); background: rgba(244,114,182,.07); }
    .phase-unknown  { color: #94a3b8; border-color: rgba(148,163,184,.3); background: rgba(148,163,184,.05); }

    .results-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 12px;
    }
    .result-chip {
      background: rgba(16,185,129,.04);
      border: 1px solid rgba(16,185,129,.18);
      border-radius: 8px; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 4px;
      animation: chipIn .3s ease both; transition: border-color .2s, transform .2s;
    }
    .result-chip:hover { border-color: rgba(16,185,129,.45); transform: translateY(-2px); }
    @keyframes chipIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
    .chip-key  { font-family: 'Orbitron', sans-serif; font-size: .58rem; color: var(--text-secondary); opacity: 0.8; letter-spacing: 1.5px; text-transform: uppercase; }
    .chip-name { font-family: 'Orbitron', sans-serif; font-size: .72rem; color: var(--text-secondary); }
    .chip-val  { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--text-primary); text-shadow: 0 0 10px rgba(16,185,129,.2); }
    .chip-unit { font-family: 'Orbitron', sans-serif; font-size: .62rem; color: var(--color-engineering); }
    .chip-na   { color: var(--text-secondary); opacity: 0.6; }

    /* cp status */
    .cp-status {
      font-family: 'Orbitron', sans-serif; font-size: .62rem;
      color: #555; margin-top: 8px; letter-spacing: 1px;
    }
    .cp-status.ready { color: var(--color-engineering); }
    .cp-status.error { color: #f87171; }
  </style>
</head>
<body>
<div class="layout">
  <header id="main-navbar"></header>

  <!-- Loading overlay (Pyodide + CoolProp) -->
  <div id="loading-overlay">
    <div class="load-title">⚗ Inizializzazione CoolProp</div>
    <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
    <div id="load-status" class="load-sub">Caricamento ambiente Python (Pyodide)…</div>
    <div class="load-sub">Il primo caricamento richiede ~20 secondi.</div>
  </div>

  <main class="main">
    <h2 style="color:var(--color-engineering);text-align:center;margin-bottom:10px;font-size:2rem;">
      Proprietà Fluido
    </h2>
    <p style="text-align:center;margin-bottom:30px;font-size:.9rem;color:var(--text-secondary);letter-spacing:1px;">
      <a href="../../index.html" style="color:var(--color-engineering);text-decoration:none;">Tools</a>
      <span style="margin:0 6px;">/</span>
      <a href="../index.html" style="color:var(--color-engineering);text-decoration:none;">Termodinamica</a>
      <span style="margin:0 6px;">/</span>
      <span style="color:var(--text-primary);">Calcolatore Proprietà Fluido</span>
    </p>

    <div class="tool-wrapper">

      <!-- INPUT CARD -->
      <div class="input-card">
        <h3>⚗ Parametri</h3>

        <div class="form-grid">
          <!-- Fluido -->
          <div class="form-field">
            <label>Fluido</label>
            <div class="select-wrap">
              <select id="sel-fluid">
                <optgroup label="── Acqua / Vapore ──">
                  <option value="Water" selected>Acqua (Water)</option>
                </optgroup>
                <optgroup label="── Refrigeranti ──">
                  <option value="R134a">R134a</option>
                  <option value="R410A">R410A</option>
                  <option value="R32">R32</option>
                  <option value="R22">R22</option>
                  <option value="R290">R290 (Propano)</option>
                  <option value="R744">R744 (CO₂)</option>
                  <option value="R717">R717 (Ammoniaca)</option>
                  <option value="R600a">R600a (Isobutano)</option>
                  <option value="R1234yf">R1234yf</option>
                  <option value="R1234ze(E)">R1234ze(E)</option>
                </optgroup>
                <optgroup label="── Gas industriali ──">
                  <option value="Nitrogen">Azoto (N₂)</option>
                  <option value="Oxygen">Ossigeno (O₂)</option>
                  <option value="Air">Aria</option>
                  <option value="CarbonDioxide">CO₂</option>
                  <option value="Hydrogen">Idrogeno (H₂)</option>
                  <option value="Helium">Elio</option>
                  <option value="Argon">Argon</option>
                  <option value="Methane">Metano (CH₄)</option>
                </optgroup>
                <optgroup label="── Idrocarburi ──">
                  <option value="Propane">Propano</option>
                  <option value="n-Butane">n-Butano</option>
                  <option value="Ethanol">Etanolo</option>
                  <option value="n-Hexane">n-Esano</option>
                  <option value="n-Octane">n-Ottano</option>
                  <option value="Toluene">Toluene</option>

            </div>
          </div>

          <!-- Coppia input -->
          <div class="form-field">
            <label>Coppia di input</label>
            <div class="select-wrap">
              <select id="sel-pair" onchange="onPairChange()">
                <option value="PT">P – T  (Pressione, Temperatura)</option>
                <option value="PH">P – H  (Pressione, Entalpia)</option>
                <option value="PS">P – S  (Pressione, Entropia)</option>
                <option value="PD">P – ρ  (Pressione, Densità)</option>
                <option value="TH">T – H  (Temperatura, Entalpia)</option>
                <option value="TS">T – S  (Temperatura, Entropia)</option>
                <option value="TD">T – ρ  (Temperatura, Densità)</option>
                <option value="HS">H – S  (Entalpia, Entropia)</option>
                <option value="TQ">T – Q  (Temperatura, Titolo — curva sat.)</option>

              </select>

        </div>

        <!-- Pair values -->
        <div class="pair-row">
          <div class="pair-field">
            <label id="lbl-v1">Pressione</label>
            <div class="input-with-unit">
              <input type="number" id="val1" value="1.01325" step="any" placeholder="es. 1.01325">
              <span class="unit-badge" id="unit1">Pa</span>

          <div class="pair-field">

        <hr class="sep">

        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">

            ▶ Calcola
          </button>
          <span class="cp-status" id="cp-status">CoolProp: inizializzazione…</span>

      <!-- RESULTS CARD -->
      <div class="results-card" id="results-card">
        <h3>📊 Risultati — <span id="res-fluid-name" style="color:var(--text-primary);"></span></h3>

<!-- Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>

<script>
'use strict';

/* ── coppie di input ─────────────────────────────────────── */
// Unità utente: T in °C, P in bar(a), H in kJ/kg, S in kJ/kg·K. Le conversioni verso SI avvengono in calcola().
const PAIRS = {
  PT: [{ label:'Pressione',      unit:'bar',      cp:'P', hint:'es. 1.01325' },
       { label:'Temperatura',    unit:'°C',       cp:'T', hint:'es. 25'      }],
  PH: [{ label:'Pressione',      unit:'bar',      cp:'P', hint:'es. 1.01325' },
       { label:'Entalpia spec.', unit:'kJ/kg',    cp:'H', hint:'es. 2500'    }],
  PS: [{ label:'Pressione',      unit:'bar',      cp:'P', hint:'es. 1.01325' },
       { label:'Entropia spec.', unit:'kJ/kg·K',  cp:'S', hint:'es. 6.9'     }],
  PD: [{ label:'Pressione',      unit:'bar',      cp:'P', hint:'es. 1.01325' },
       { label:'Densità',        unit:'kg/m³',    cp:'D', hint:'es. 1.2'     }],
  TH: [{ label:'Temperatura',    unit:'°C',       cp:'T', hint:'es. 25'      },
       { label:'Entalpia spec.', unit:'kJ/kg',    cp:'H', hint:'es. 2500'    }],
  TS: [{ label:'Temperatura',    unit:'°C',       cp:'T', hint:'es. 25'      },
       { label:'Entropia spec.', unit:'kJ/kg·K',  cp:'S', hint:'es. 6.9'     }],
  TD: [{ label:'Temperatura',    unit:'°C',       cp:'T', hint:'es. 25'      },
       { label:'Densità',        unit:'kg/m³',    cp:'D', hint:'es. 1.2'     }],
  HS: [{ label:'Entalpia spec.', unit:'kJ/kg',    cp:'H', hint:'es. 2500'    },
       { label:'Entropia spec.', unit:'kJ/kg·K',  cp:'S', hint:'es. 6.9'     }],
  TQ: [{ label:'Temperatura',    unit:'°C',       cp:'T', hint:'es. 100'     },
       { label:'Titolo vapore',  unit:'0–1',      cp:'Q', hint:'0=liq 1=vap' }],
  PQ: [{ label:'Pressione',      unit:'bar',      cp:'P', hint:'es. 1.01325' },
       { label:'Titolo vapore',  unit:'0–1',      cp:'Q', hint:'0=liq 1=vap' }],
};

/* ── proprietà output ────────────────────────────────────── */
// T: K → °C ;  P: Pa → bar ;  J → kJ
const OUTPUTS = [
  { key:'T',       name:'Temperatura',              unit:'°C',        fmt: v => (v - 273.15).toFixed(3) },
  { key:'P',       name:'Pressione',                unit:'bar',       fmt: v => (v / 1e5).toFixed(5)    },
  { key:'D',       name:'Densità',                  unit:'kg/m³',     fmt: v => v.toFixed(5) },
  { key:'H',       name:'Entalpia specifica',       unit:'kJ/kg',     fmt: v => (v / 1e3).toFixed(4) },
  { key:'S',       name:'Entropia specifica',       unit:'kJ/kg·K',   fmt: v => (v / 1e3).toFixed(6) },
  { key:'U',       name:'En. interna specifica',    unit:'kJ/kg',     fmt: v => (v / 1e3).toFixed(4) },
  { key:'Cpmass',  name:'Cp (isobaro)',             unit:'kJ/kg·K',   fmt: v => (v / 1e3).toFixed(5) },
  { key:'Cvmass',  name:'Cv (isocoro)',             unit:'kJ/kg·K',   fmt: v => (v / 1e3).toFixed(5) },
  { key:'A',       name:'Velocità del suono',       unit:'m/s',       fmt: v => v.toFixed(3) },
  { key:'V',       name:'Viscosità dinamica',       unit:'Pa·s',      fmt: v => v.toExponential(4) },
  { key:'L',       name:'Conduttività termica',     unit:'W/m·K',     fmt: v => v.toFixed(5) },
  { key:'Q',       name:'Titolo vapore',            unit:'—',         fmt: v => (v < -0.5 || v > 1.5) ? 'n/a' : v.toFixed(4) },
  { key:'Prandtl', name:'Numero di Prandtl',        unit:'—',         fmt: v => v.toFixed(4) },
  { key:'I',       name:'Tensione superficiale',    unit:'N/m',       fmt: v => v.toExponential(4) },
];

const PHASE_MAP = {
  liquid:               { cls:'phase-liquid',  icon:'💧', txt:'Liquido' },
  gas:                  { cls:'phase-gas',     icon:'☁️', txt:'Gas / Vapore surriscaldato' },
  supercritical_gas:    { cls:'phase-super',   icon:'⚡', txt:'Gas supercritico' },
  supercritical_liquid: { cls:'phase-super',   icon:'⚡', txt:'Liquido supercritico' },
  supercritical:        { cls:'phase-super',   icon:'⚡', txt:'Fluido supercritico' },
  twophase:             { cls:'phase-twophase',icon:'🌊', txt:'Bifase (liquido + vapore)' },
};

/* ── Pyodide state ───────────────────────────────────────── */
let pyodide = null;
let cpReady  = false;

async function initPyodide() {
  const bar    = document.getElementById('load-bar');
  const status = document.getElementById('load-status');

  try {
    status.textContent = 'Caricamento Pyodide (Python WebAssembly)…';
    bar.style.width = '10%';

    pyodide = await loadPyodide();
    bar.style.width = '40%';
    status.textContent = 'Installazione CoolProp…';

    await pyodide.loadPackage('micropip');
    bar.style.width = '55%';

    await pyodide.runPythonAsync(`
import micropip
await micropip.install('CoolProp')
`);
    bar.style.width = '85%';
    status.textContent = 'Verifica importazione…';

    await pyodide.runPythonAsync(`
from CoolProp.CoolProp import PropsSI, PhaseSI
# test rapido
_t = PropsSI('T','P',101325,'Q',0,'Water')
`);
    bar.style.width = '100%';
    status.textContent = 'Pronto ✓';

    cpReady = true;
    document.getElementById('cp-status').textContent = 'CoolProp: pronto ✓';
    document.getElementById('cp-status').classList.add('ready');
    document.getElementById('btn-calc').disabled = false;

    setTimeout(() => {
      document.getElementById('loading-overlay').style.display = 'none';
    }, 600);

  } catch(e) {
    bar.style.background = '#ef4444';
    status.textContent = 'Errore: ' + e.message;
    document.getElementById('cp-status').textContent = 'CoolProp: errore caricamento';
    document.getElementById('cp-status').classList.add('error');
    document.getElementById('loading-overlay').style.display = 'none';
    console.error(e);
  }
}

/* ── sync UI coppia ──────────────────────────────────────── */
function onPairChange() {
  const key = document.getElementById('sel-pair').value;
  const [p1, p2] = PAIRS[key];
  document.getElementById('lbl-v1').textContent  = p1.label;
  document.getElementById('unit1').textContent   = p1.unit;
  document.getElementById('val1').placeholder    = p1.hint;
  document.getElementById('lbl-v2').textContent  = p2.label;
  document.getElementById('unit2').textContent   = p2.unit;
  document.getElementById('val2').placeholder    = p2.hint;
  hideError();
  document.getElementById('results-card').style.display = 'none';
}

/* ── calcola ─────────────────────────────────────────────── */
async function calcola() {
  if (!cpReady) { showError('CoolProp non ancora pronto. Attendi.'); return; }
  hideError();

  const fluid = document.getElementById('sel-fluid').value;
  const pair  = document.getElementById('sel-pair').value;
  const v1    = parseFloat(document.getElementById('val1').value);
  const v2    = parseFloat(document.getElementById('val2').value);
  if (isNaN(v1) || isNaN(v2)) { showError('Inserisci valori numerici validi.'); return; }

  const [p1def, p2def] = PAIRS[pair];

  // Converti da unità utente → SI per CoolProp
  const toSI = (val, cpProp) => {
    if (cpProp === 'T') return val + 273.15;   // °C → K
    if (cpProp === 'P') return val * 1e5;       // bar → Pa
    if (cpProp === 'H') return val * 1e3;       // kJ/kg → J/kg
    if (cpProp === 'S') return val * 1e3;       // kJ/kg·K → J/kg·K
    return val;                                 // kg/m³, Q: già SI
  };
  const si1 = toSI(v1, p1def.cp);
  const si2 = toSI(v2, p2def.cp);

  setLoading(true);
  try {
    // Costruisci script Python che calcola tutte le proprietà
    const outKeys = OUTPUTS.map(o => o.key);
    const pyScript = `
import json, math
from CoolProp.CoolProp import PropsSI, PhaseSI

fluid  = "${fluid}"
prop1  = "${p1def.cp}"
val1   = ${si1}
prop2  = "${p2def.cp}"
val2   = ${si2}
keys   = ${JSON.stringify(outKeys)}

results = {}
for k in keys:
    try:
        v = PropsSI(k, prop1, val1, prop2, val2, fluid)
        results[k] = None if (math.isnan(v) or math.isinf(v)) else v
    except Exception as ex:
        results[k] = None

try:
    phase = PhaseSI(prop1, val1, prop2, val2, fluid)
except:
    phase = "unknown"

json.dumps({"results": results, "phase": phase})
`;
    const jsonStr = await pyodide.runPythonAsync(pyScript);
    const { results, phase } = JSON.parse(jsonStr);
    renderResults(results, phase, fluid);
  } catch(e) {
    showError('Errore calcolo: ' + e.message);
    console.error(e);
  } finally {
    setLoading(false);
  }
}

/* ── render ──────────────────────────────────────────────── */
function renderResults(results, phase, fluid) {
  document.getElementById('res-fluid-name').textContent = fluid;

  const ph = PHASE_MAP[phase] || { cls:'phase-unknown', icon:'❓', txt: phase || 'Sconosciuto' };
  document.getElementById('phase-wrap').innerHTML =
    `<div class="phase-badge ${ph.cls}">${ph.icon} ${ph.txt}</div>`;

  const grid = document.getElementById('results-grid');
  grid.innerHTML = '';
  OUTPUTS.forEach((o, i) => {
    const raw = results[o.key];
    let valHtml, unit = o.unit;
    if (raw === null || raw === undefined) {
      valHtml = '<span class="chip-na">n/d</span>'; unit = '';
    } else {
      const fmted = o.fmt(raw);
      valHtml = fmted === 'n/a' ? '<span class="chip-na">n/a</span>' : fmted;
    }
    const chip = document.createElement('div');
    chip.className = 'result-chip';
    chip.style.animationDelay = (i * 30) + 'ms';
    chip.innerHTML = `
      <span class="chip-key">${o.key}</span>
      <span class="chip-name">${o.name}</span>
      <span class="chip-val">${valHtml}</span>
      <span class="chip-unit">${unit}</span>`;
    grid.appendChild(chip);
  });

  const card = document.getElementById('results-card');
  card.style.display = 'block';
  card.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

/* ── helpers ─────────────────────────────────────────────── */
function setLoading(on) {
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btn-calc').disabled = on;
}
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = '⚠ ' + msg; el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-box').style.display = 'none';
}

/* ── boot ────────────────────────────────────────────────── */
window.addEventListener('load', () => {
  onPairChange();
  initPyodide();
});
</script>
