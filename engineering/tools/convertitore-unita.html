<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Convertitore Unità di Misura Online — Pressione, Portata, Energia</title>
    <meta name="description" content="Convertitore gratuito di unità di misura per ingegneria: pressione (bar, psi, atm), temperatura, portata (kg/h, m³/h, l/s), energia e potenza.">
    <script>
(function(){var p=localStorage.getItem("themePref");if(p==="light"){document.documentElement.classList.add("light-mode")}else if(!p){try{var d=JSON.parse(localStorage.getItem("themeData"));if(d){var n=Date.now();if(n>=d.sunrise&&n<d.sunset)document.documentElement.classList.add("light-mode")}}catch(e){}}})();
    </script>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tool-wrap { max-width: 860px; margin: 0 auto; padding-bottom: 40px; }
        .tool-panel { background:var(--bg-secondary,rgba(255,255,255,0.04));border:1px solid var(--border-color,rgba(255,255,255,0.1));border-radius:12px;padding:24px;margin-top:24px; }
        
        .converter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; position: relative; }
        @media(max-width: 640px) { .converter-grid { grid-template-columns: 1fr; gap: 40px; } }
        
        .field-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .field-label { font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .field-input, .field-select {
            width: 100%; background: #1a1f2e; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; padding: 12px 14px; font-size: 1.05rem; color: #e8d88a; outline: none; transition: border-color 0.2s;
        }
        .light-mode .field-input, .light-mode .field-select { background:#f5f5f0; border-color:rgba(0,0,0,0.2); color:#3a3000; }
        .field-input:focus, .field-select:focus { border-color: var(--color-engineering); }
        
        .swap-btn-wrap { 
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        @media(max-width: 640px) { 
            .swap-btn-wrap { top: 48%; } /* approximate center in mobile */
        }
        .swap-btn {
            background: rgba(var(--color-engineering-rgb,200,160,60),0.15); border: 1px solid rgba(var(--color-engineering-rgb,200,160,60),0.4); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: var(--color-engineering); cursor: pointer; transition: transform 0.2s, background 0.2s; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
        }
        .light-mode .swap-btn { background: #fff; border-color: rgba(0,0,0,0.1); }
        .swap-btn:hover { background: rgba(var(--color-engineering-rgb,200,160,60),0.25); transform: rotate(180deg); }
        
        .result-box {
            background: rgba(var(--color-engineering-rgb,200,160,60),0.06); border: 1px solid rgba(var(--color-engineering-rgb,200,160,60),0.3); border-radius: 12px; padding: 24px 16px; text-align: center; margin-top: 10px; min-height: 110px; display: flex; flex-direction: column; justify-content: center;
        }
        .result-val { font-size: 2.2rem; font-weight: 700; color: var(--color-engineering); font-family: 'Orbitron', sans-serif; word-break: break-word; line-height: 1.1; margin-bottom: 4px; }
        .result-unit-lbl { font-size: 0.9rem; color: var(--text-secondary); font-weight: 600; }
        .formula-box { margin-top: 24px; font-size: 0.85rem; color: var(--text-secondary); background: var(--bg-card, rgba(255,255,255,0.03)); padding: 14px; border-radius: 8px; text-align: center; border: 1px dashed rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; gap: 8px; }
        .formula-box i { color: var(--color-engineering); }
    </style>
</head>
<body>
<div class="layout">
    <header id="main-navbar"></header>
    <main class="main">
    <div class="tool-wrap">
        <h2 style="color:var(--color-engineering);text-align:center;margin-bottom:10px;font-size:1.9rem;">
            Convertitore Unità di Misura
        </h2>
        <p style="text-align:center;margin-bottom:28px;font-size:.9rem;color:var(--text-secondary);letter-spacing:1px;">
            <a href="../index.html" style="color:var(--color-engineering);text-decoration:none;">Ingegneria</a>
            <span style="margin:0 6px;">/</span>
            <span style="color:var(--text-primary);">Convertitore</span>
        </p>

        <div class="tool-panel">
            <div class="field-group" style="max-width: 320px; margin: 0 auto 30px;">
                <span class="field-label" style="text-align:center;">Categoria grandezza</span>
                <select class="field-select" id="categoria" onchange="changeCategory()" style="text-align:center;">
                    <option value="lunghezza">Lunghezza</option>
                    <option value="massa">Massa</option>
                    <option value="pressione">Pressione</option>
                    <option value="temperatura">Temperatura</option>
                    <option value="volume">Volume</option>
                    <option value="portata">Portata</option>
                    <option value="energia">Energia</option>
                    <option value="potenza">Potenza</option>
                </select>
            </div>

            <div class="converter-grid">
                <div>
                    <div class="field-group">
                        <span class="field-label">Da</span>
                        <select class="field-select" id="unita-da" onchange="convert()"></select>
                    </div>
                    <div class="field-group">
                        <span class="field-label">Valore</span>
                        <input type="number" class="field-input" id="valore" value="1" oninput="convert()" step="any">
                    </div>
                </div>
                
                <div class="swap-btn-wrap">
                    <button class="swap-btn" onclick="swapUnits()" title="Inverti unità"><i class="fa-solid fa-right-left"></i></button>
                </div>
                
                <div>
                    <div class="field-group">
                        <span class="field-label">A</span>
                        <select class="field-select" id="unita-a" onchange="convert()"></select>
                    </div>
                    <div class="field-group">
                        <span class="field-label" style="opacity:0;">Risultato</span>
                        <div class="result-box">
                            <div class="result-val" id="risultato">1</div>
                            <div class="result-unit-lbl" id="risultato-unit">m</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="density-container" style="display:none; margin-top: 24px; text-align: center;">
                <div class="field-group" style="max-width: 320px; margin: 0 auto;">
                    <span class="field-label">Densità fluido (kg/m³)</span>
                    <input type="number" class="field-input" id="densita" value="1000" oninput="convert()" step="any" style="text-align:center;">
                </div>
            </div>

            <div class="formula-box">
                <i class="fa-solid fa-calculator"></i> <span id="formula">1 m = 1 m</span>
            </div>
            
        </div>
    </div>
    </main>
</div>

<script src="../../js/navbar.js"></script>
<script src="../../js/main.js"></script>
<script src="../../js/footer.js"></script>
<script>
    const units = {
        lunghezza: {
            m: {name:"Metri (m)", factor:1},
            cm: {name:"Centimetri (cm)", factor:0.01},
            mm: {name:"Millimetri (mm)", factor:0.001},
            km: {name:"Chilometri (km)", factor:1000},
            in: {name:"Pollici (in)", factor:0.0254},
            ft: {name:"Piedi (ft)", factor:0.3048},
            yd: {name:"Iarde (yd)", factor:0.9144},
            mi: {name:"Miglia (mi)", factor:1609.344}
        },
        massa: {
            kg: {name:"Chilogrammi (kg)", factor:1},
            g: {name:"Grammi (g)", factor:0.001},
            mg: {name:"Milligrammi (mg)", factor:0.000001},
            t: {name:"Tonnellate (t)", factor:1000},
            lb: {name:"Libbre (lb)", factor:0.45359237},
            oz: {name:"Once (oz)", factor:0.0283495231}
        },
        pressione: {
            pa: {name:"Pascal (Pa)", factor:1, offset:0},
            kpa: {name:"Chilopascal (kPa)", factor:1000, offset:0},
            mpa: {name:"Megapascal (MPa)", factor:1000000, offset:0},
            bar_a: {name:"Bar ass. (bar a)", factor:100000, offset:0},
            bar_g: {name:"Bar rel. (bar g)", factor:100000, offset:101325},
            atm: {name:"Atmosfere (atm)", factor:101325, offset:0},
            psi: {name:"PSI (lbf/in²)", factor:6894.75729, offset:0},
            mmhg: {name:"mm Hg (Torr)", factor:133.322387, offset:0}
        },
        temperatura: {
            c: {name:"Celsius (°C)"},
            f: {name:"Fahrenheit (°F)"},
            k: {name:"Kelvin (K)"}
        },
        volume: {
            l: {name:"Litri (L)", factor:0.001},
            m3: {name:"Metri cubi (m³)", factor:1},
            ml: {name:"Millilitri (mL)", factor:0.000001},
            gal: {name:"Galloni (gal US)", factor:0.00378541},
            bbl: {name:"Barili (bbl oil)", factor:0.1589873}
        },
        portata: {
            kgh: {name:"Portata massica (kg/h)", factor:1, type:"mass"},
            th: {name:"Portata massica (t/h)", factor:1000, type:"mass"},
            kgs: {name:"Portata massica (kg/s)", factor:3600, type:"mass"},
            kgmin: {name:"Portata massica (kg/min)", factor:60, type:"mass"},
            gs: {name:"Portata massica (g/s)", factor:3.6, type:"mass"},
            m3h: {name:"Portata vol. (m³/h)", factor:1, type:"vol"},
            m3s: {name:"Portata vol. (m³/s)", factor:3600, type:"vol"},
            ls: {name:"Portata vol. (l/s)", factor:3.6, type:"vol"},
            lmin: {name:"Portata vol. (l/min)", factor:0.06, type:"vol"},
            gpm: {name:"Portata vol. (GPM US)", factor:0.227124707, type:"vol"}
        },
        energia: {
            j: {name:"Joule (J)", factor:1},
            kj: {name:"Chilojoule (kJ)", factor:1000},
            cal: {name:"Calorie (cal)", factor:4.184},
            kcal: {name:"Chilocalorie (kcal)", factor:4184},
            wh: {name:"Wattora (Wh)", factor:3600},
            kwh: {name:"Chilowattora (kWh)", factor:3600000},
            btu: {name:"BTU", factor:1055.05585}
        },
        potenza: {
            w: {name:"Watt (W)", factor:1},
            kw: {name:"Chilowatt (kW)", factor:1000},
            mw: {name:"Megawatt (MW)", factor:1000000},
            hp: {name:"Cavalli Vapore (hp)", factor:745.699872},
            cv: {name:"Cavalli Vapore (CV)", factor:735.49875},
            kcalh: {name:"Kcal/h", factor:1.163}
        }
    };

    const selCat = document.getElementById("categoria");
    const selDa = document.getElementById("unita-da");
    const selA = document.getElementById("unita-a");
    const inpVal = document.getElementById("valore");
    const outRes = document.getElementById("risultato");
    const outUnit = document.getElementById("risultato-unit");
    const outForm = document.getElementById("formula");

    function changeCategory() {
        const cat = selCat.value;
        const opts = units[cat];
        selDa.innerHTML = "";
        selA.innerHTML = "";
        let i = 0;
        for (let key in opts) {
            selDa.innerHTML += `<option value="${key}">${opts[key].name}</option>`;
            selA.innerHTML += `<option value="${key}">${opts[key].name}</option>`;
            // default conversion: from 1st to 2nd (if exists) or 1st to 1st
            if (i === 1) selA.value = key;
            i++;
        }
        convert();
    }

    function swapUnits() {
        const temp = selDa.value;
        selDa.value = selA.value;
        selA.value = temp;
        convert();
    }

    function formatNumber(num) {
        if (num === 0) return "0";
        if (Math.abs(num) < 0.0001 || Math.abs(num) > 1000000) return num.toExponential(4);
        const str = num.toPrecision(7);
        return parseFloat(str).toString(); // remove trailing zeros
    }

    function convert() {
        const cat = selCat.value;
        const da = selDa.value;
        const a = selA.value;
        const val = parseFloat(inpVal.value);
        if (isNaN(val)) {
            outRes.innerText = "—";
            outUnit.innerText = "";
            outForm.innerText = "Inserisci un valore valido";
            document.getElementById("density-container").style.display = "none";
            return;
        }

        let res = 0;
        let formulaStr = "";

        // extract symbol from parenthesis
        let matchDa = units[cat][da].name.match(/\(([^)]+)\)/);
        let matchA = units[cat][a].name.match(/\(([^)]+)\)/);
        let symDa = matchDa ? matchDa[1] : da;
        let symA = matchA ? matchA[1] : a;

        const densityContainer = document.getElementById("density-container");
        let density = 1000;
        if (cat === "portata" && units[cat][da].type !== units[cat][a].type) {
            densityContainer.style.display = "block";
            density = parseFloat(document.getElementById("densita").value) || 1000;
        } else {
            densityContainer.style.display = "none";
        }

        if (cat === "temperatura") {
            let valInC = val;
            if (da === "f") valInC = (val - 32) * 5/9;
            else if (da === "k") valInC = val - 273.15;

            if (a === "c") res = valInC;
            else if (a === "f") res = (valInC * 9/5) + 32;
            else if (a === "k") res = valInC + 273.15;
            
            formulaStr = `Conversione temperatura: ${formatNumber(val)} ${symDa} = ${formatNumber(res)} ${symA}`;
        } 
        else if (cat === "pressione") {
            const factorDa = units[cat][da].factor || 1;
            const offsetDa = units[cat][da].offset || 0;
            const factorA = units[cat][a].factor || 1;
            const offsetA = units[cat][a].offset || 0;
            
            const valInPaAbs = val * factorDa + offsetDa;
            res = (valInPaAbs - offsetA) / factorA;
            
            if (offsetDa === offsetA && factorDa === factorA) {
                formulaStr = `Valori identici: ${symDa} = ${symA}`;
            } else {
                formulaStr = `Base Pascal Ass.: P_abs = ${formatNumber(valInPaAbs)} Pa a`;
            }
        }
        else if (cat === "portata" && units[cat][da].type !== units[cat][a].type) {
            const typeDa = units[cat][da].type;
            const factorDa = units[cat][da].factor;
            const typeA = units[cat][a].type;
            const factorA = units[cat][a].factor;
            
            if (typeDa === "mass" && typeA === "vol") {
                const valInKgH = val * factorDa;
                const valInM3H = valInKgH / density;
                res = valInM3H / factorA;
                formulaStr = `Conversione massa \u2192 volume con densità ${density} kg/m³`;
            } else if (typeDa === "vol" && typeA === "mass") {
                const valInM3H = val * factorDa;
                const valInKgH = valInM3H * density;
                res = valInKgH / factorA;
                formulaStr = `Conversione volume \u2192 massa con densità ${density} kg/m³`;
            }
        }
        else {
            const factorDa = units[cat][da].factor || 1;
            const factorA = units[cat][a].factor || 1;
            const valInBase = val * factorDa;
            res = valInBase / factorA;
            
            const ratio = factorDa / factorA;
            if (ratio === 1) {
                formulaStr = `Valori identici: ${symDa} = ${symA}`;
            } else {
                formulaStr = `Fattore di conversione: 1 ${symDa} = ${formatNumber(ratio)} ${symA}`;
            }
        }

        outRes.innerText = formatNumber(res);
        outUnit.innerText = symA;
        outForm.innerText = formulaStr;
    }

    // Initialize
    changeCategory();
</script>
</body>
</html>
