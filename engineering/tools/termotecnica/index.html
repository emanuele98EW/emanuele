<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Termotecnica — Dispersione Termica e Trasmissione Calore</title>
    <meta name="description" content="Calcolatori di termotecnica: dispersione termica di tubazioni e serbatoi, trasmissione del calore, coibentazione e conduttività termica.">
    <script>
(function(){var p=localStorage.getItem("themePref");if(p==="light"){document.documentElement.classList.add("light-mode")}else if(!p){try{var d=JSON.parse(localStorage.getItem("themeData"));if(d){var n=Date.now();if(n>=d.sunrise&&n<d.sunset)document.documentElement.classList.add("light-mode")}}catch(e){}}})();
    </script>
    <link rel="stylesheet" href="../../../css/style.css">
    <style>
        .accordion-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            margin-top: 24px;
            border: 1px solid var(--border-color, rgba(255,255,255,0.1));
            border-radius: 12px;
            overflow: hidden;
        }
        .accordion-item {
            border-bottom: 1px solid var(--border-color, rgba(255,255,255,0.08));
        }
        .accordion-item:last-child { border-bottom: none; }
        .accordion-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            cursor: pointer;
            background: transparent;
            transition: background 0.2s;
            user-select: none;
        }
        .accordion-header:hover {
            background: rgba(var(--color-engineering-rgb, 200,160,60), 0.06);
        }
        .accordion-icon {
            width: 24px;
            height: 24px;
            border: 1.5px solid var(--color-engineering);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.25s;
            color: var(--color-engineering);
            font-size: 18px;
            font-weight: 300;
            line-height: 1;
        }
        .accordion-icon.open { transform: rotate(45deg); }
        .accordion-title {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .accordion-body {
            display: none;
            flex-direction: column;
            padding: 0 20px 12px 58px;
            gap: 0;
        }
        .accordion-body.open { display: flex; }
        .accordion-sub {
            display: block;
            padding: 10px 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-bottom: 1px solid var(--border-color, rgba(255,255,255,0.05));
            transition: color 0.15s, padding-left 0.15s;
        }
        .accordion-sub:last-child { border-bottom: none; }
        .accordion-sub:hover {
            color: var(--color-engineering);
            padding-left: 6px;
        }
    </style>
</head>
<body>
    <div class="layout">
        <header id="main-navbar"></header>
        <main class="main">

            <h2 style="color: var(--color-engineering); text-align: center; margin-bottom: 10px; font-size: 2rem;">
                Termotecnica
            </h2>
            <p style="text-align: center; margin-bottom: 30px; font-size: 0.9rem; color: var(--text-secondary); letter-spacing: 1px;">
                <a href="../index.html" style="color: var(--color-engineering); text-decoration: none;">Tools</a>
                <span style="margin: 0 6px;">/</span>
                <span style="color: var(--text-primary);">Termotecnica</span>
            </p>

            <div class="accordion-list">

                <!-- 1. Dispersione Termica -->
                <div class="accordion-item">
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <div class="accordion-icon">+</div>
                        <span class="accordion-title">Dispersione Termica</span>
                    </div>
                    <div class="accordion-body">
                        <a class="accordion-sub" href="dispersione/dispersione-tubazione.html">Dispersione Termica Tubazione</a>
                        <a class="accordion-sub" href="dispersione/dispersione-serbatoio.html">Dispersione Termica Serbatoio</a>
                    </div>
                </div>

            </div>

        </main>
    </div>

    <script src="../../../js/navbar.js"></script>
    <script src="../../../js/main.js"></script>
    <script src="../../../js/footer.js"></script>
    <script>
    function toggleAccordion(header) {
        const icon = header.querySelector('.accordion-icon');
        const body = header.nextElementSibling;
        const isOpen = body.classList.contains('open');
        document.querySelectorAll('.accordion-body').forEach(b => b.classList.remove('open'));
        document.querySelectorAll('.accordion-icon').forEach(i => i.classList.remove('open'));
        if (!isOpen) {
            body.classList.add('open');
            icon.classList.add('open');
        }
    }
    </script>
</body>
</html>
