<script>
// ==========================================
// 3D INTERACTIVE WIREFRAME GLOBE (HERO)
// ==========================================
const canvas3D = document.getElementById('hero-3d-canvas');
if (canvas3D) {
  const ctx = canvas3D.getContext('2d', { alpha: true });
  const size = 180; // Render resolution (CSS scales it to 100px)
  canvas3D.width = size;
  canvas3D.height = size;
  
  let nodes = [];
  const numNodes = 65;
  const radius = 70;

  // Generate points on a sphere
  for (let i = 0; i < numNodes; i++) {
    const phi = Math.acos(1 - 2 * (i + 0.5) / numNodes);
    const theta = Math.PI * (1 + Math.sqrt(5)) * i;
    nodes.push({
      x: radius * Math.cos(theta) * Math.sin(phi),
      y: radius * Math.sin(theta) * Math.sin(phi),
      z: radius * Math.cos(phi)
    });
  }

  let angleX = 0, angleY = 0;
  let targetAngleX = 0, targetAngleY = 0;
  let isHover = false;
  
  canvas3D.addEventListener('pointermove', e => {
    const rect = canvas3D.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width - 0.5;
    const y = (e.clientY - rect.top) / rect.height - 0.5;
    targetAngleY = x * 4; 
    targetAngleX = y * 4;
    isHover = true;
  });
  
  canvas3D.addEventListener('pointerleave', () => { isHover = false; });

  function draw3D() {
    ctx.clearRect(0, 0, size, size);
    
    // Smooth transition
    if (isHover) {
      angleX += (targetAngleX - angleX) * 0.08;
      angleY += (targetAngleY - angleY) * 0.08;
    } else {
      angleX += (0 - angleX) * 0.05;
      angleY -= 0.015; // Constant slow auto-rotation
    }

    const cosX = Math.cos(angleX), sinX = Math.sin(angleX);
    const cosY = Math.cos(angleY), sinY = Math.sin(angleY);

    const projected = nodes.map(n => {
      let y1 = n.y * cosX - n.z * sinX;
      let z1 = n.y * sinX + n.z * cosX;
      let x2 = n.x * cosY + z1 * sinY;
      let z2 = -n.x * sinY + z1 * cosY;
      
      let pDistance = 200;
      let perspective = pDistance / (pDistance + z2);
      
      return {
        x: x2 * perspective + size / 2,
        y: y1 * perspective + size / 2,
        z: z2,
        p: perspective
      };
    });

    // Draw connecting lines
    ctx.lineWidth = 1;
    for (let i = 0; i < projected.length; i++) {
      for (let j = i + 1; j < projected.length; j++) {
        let dx = projected[i].x - projected[j].x;
        let dy = projected[i].y - projected[j].y;
        if ((dx * dx + dy * dy) < 1400) {
          let zDepth = (projected[i].z + projected[j].z) / 2;
          let opacity = Math.max(0.05, 1 - (zDepth + radius) / (radius * 1.8));
          ctx.strokeStyle = `rgba(201, 168, 76, ${opacity * 0.4})`;
          ctx.beginPath();
          ctx.moveTo(projected[i].x, projected[i].y);
          ctx.lineTo(projected[j].x, projected[j].y);
          ctx.stroke();
        }
      }
    }
    
    // Draw dots
    projected.forEach(p => {
      let opacity = Math.max(0.1, 1 - (p.z + radius) / (radius * 1.8));
      ctx.fillStyle = `rgba(201, 168, 76, ${opacity})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.5, 2.2 * p.p), 0, Math.PI * 2);
      ctx.fill();
    });

    requestAnimationFrame(draw3D);
  }
  draw3D();
}

let issMap=null, issMarker=null;

async function fetchISS() {
  try {
    const r = await fetch("https://api.wheretheiss.at/v1/satellites/25544");
    if (!r.ok) throw new Error();
    const d = await r.json();
    const lat=d.latitude, lon=d.longitude, alt=Math.round(d.altitude), vel=Math.round(d.velocity);
    if (!issMap) {
      issMap = L.map('iss-map',{zoomControl:false,attributionControl:false}).setView([lat,lon],2);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(issMap);
      const ico = L.divIcon({html:'<span style="font-size:20px;text-shadow:0 0 8px rgba(250,204,21,.8);">🛰️</span>',className:'',iconSize:[20,20],iconAnchor:[10,10]});
      issMarker = L.marker([lat,lon],{icon:ico}).addTo(issMap);
    } else {
      issMarker.setLatLng([lat,lon]);
      issMap.panTo([lat,lon],{animate:true,duration:1.5});
    }
    document.getElementById('iss-stats').innerHTML = `<div class="iss-stats"><div class="iss-stat"><div class="iss-stat-label">Altitudine</div><div class="iss-stat-val" style="color:#facc15;">${alt.toLocaleString('it-IT')} km</div></div><div class="iss-stat"><div class="iss-stat-label">Velocità</div><div class="iss-stat-val" style="color:#f87171;">${vel.toLocaleString('it-IT')} km/h</div></div></div>`;
    setTimeout(()=>issMap.invalidateSize(),200);
  } catch(e) {
    document.getElementById('iss-stats').innerHTML = "<span style='color:#ef4444;font-size:.74rem;'>API non disponibile</span>";
  }
}

async function fetchNEO() {
  const today = new Date().toISOString().split('T')[0];
  try {
    const r = await fetch(`https://api.nasa.gov/neo/rest/v1/feed?start_date=${today}&end_date=${today}&api_key=N1SVRVEJ7hzo9T76bgMldhMCwCfbZLAUZRIkqj8I`);
    const d = await r.json();
    if (!r.ok || d.error) throw new Error();
    const count = d.element_count;
    const neos = d.near_earth_objects[today];
    const closest = neos.reduce((a,b)=>parseFloat(a.close_approach_data[0].miss_distance.kilometers)<parseFloat(b.close_approach_data[0].miss_distance.kilometers)?a:b);
    const dist = Math.round(closest.close_approach_data[0].miss_distance.kilometers).toLocaleString('it-IT');
    document.getElementById('neo-content').innerHTML = `<div class="neo-count">${count}</div><div style="font-size:.72rem;color:var(--text-secondary);text-align:center;line-height:1.5;">in passaggio oggi<br><span style="color:var(--text-primary);">Più vicino: </span><strong style="color:#facc15;">${dist} km</strong></div>`;
  } catch(e) {
    document.getElementById('neo-content').innerHTML = "<span style='color:#ef4444;font-size:.74rem;'>Errore API NASA</span>";
  }
}


fetchISS();
setInterval(fetchISS, 5000);
fetchNEO();
</script>
